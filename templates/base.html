<!DOCTYPE html>
<html>
<head>
    <title>Campus Placement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">PLACEMENT CELL</a>
            <div class="navbar-nav ms-auto flex-row">
                {% if current_user.is_authenticated %}
                    <a class="nav-link mx-3" href="/dashboard">Dashboard</a>
                    <a class="nav-link text-warning" href="/logout">Log Out</a>
                {% else %}
                    <a class="nav-link mx-2" href="/login">Login</a>
                    <a class="nav-link mx-2" href="/register">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% with msgs = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in msgs %}<div class="alert alert-{{cat}}">{{msg}}</div>{% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
