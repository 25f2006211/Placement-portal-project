{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 card p-4">
        <h3>My Profile</h3>
        <form method="POST">
            <label>Full Name</label><input type="text" name="name" class="form-control mb-2" value="{{profile.full_name}}">
            <label>Email</label><input type="email" name="email" class="form-control mb-2" value="{{profile.email}}">
            <label>Phone</label><input type="text" name="phone" class="form-control mb-2" value="{{profile.contact}}">
            <label>Dept</label><input type="text" name="dept" class="form-control mb-2" value="{{profile.dept}}">
            <label>CGPA</label><input type="number" step="0.1" name="cgpa" class="form-control mb-2" value="{{profile.cgpa}}">
            <label>Resume Link</label><input type="text" name="resume" class="form-control mb-4" value="{{profile.resume}}">
            <button class="btn btn-primary w-100">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}
